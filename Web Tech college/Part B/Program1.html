<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.login-box{
    width:350px;
    margin:100px auto;
    padding:30px;
    background:white;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.error{
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form onsubmit="return validateForm()">

<label>Email</label>
<input type="text" id="email" placeholder="abc@email.com">

<label>Password</label>
<input type="password" id="password" placeholder="123@#ABCabc">

<p class="error" id="errorMsg"></p>

<button type="submit">Login</button>

</form>

</div>

<script>

function validateForm(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let error = document.getElementById("errorMsg");

error.innerHTML = "";

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(email == "" || password == ""){
    error.innerHTML = "All fields are required";
    return false;
}

if(!email.match(emailPattern)){
    error.innerHTML = "Enter a valid email address";
    return false;
}

if(password.length < 6){
    error.innerHTML = "Password must be at least 6 characters";
    return false;
}

alert("Login Successful");

return true;

}

</script>

</body>
</html>
